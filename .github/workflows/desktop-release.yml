name: Desktop Release

# Build + publish the Examazej Windows installer for a version tag.
#
# Triggered by `scripts/release.sh` when it runs `git push origin vX.Y.Z`. The build runs on a
# clean windows-latest runner — crucially, NOT behind the university SSL-inspection proxy, so the
# Electron binary / NSIS toolchain downloads that need `--use-system-ca` on the owner's machine
# just work here. electron-builder uploads "Examazej Setup X.Y.Z.exe" + latest.yml + .blockmap to
# the matching GitHub Release and auto-publishes it (releaseType: release in electron-builder.yml),
# so the web /download button (and, from Phase 4, the electron-updater feed) go live automatically.

on:
  push:
    tags:
      - "v*"

# electron-builder needs to create the release and upload assets.
permissions:
  contents: write

# One build per tag; don't cancel an in-flight publish if the tag is re-pushed.
concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pre-create the Release so electron-builder's parallel asset uploads (.exe / .blockmap /
      # latest.yml) find an existing release instead of each racing to create one — which on
      # v1.6.2 produced TWO releases for the same tag. Idempotent: reuse if it already exists.
      - name: Ensure the GitHub Release exists (avoids electron-builder duplicate-release race)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — reusing."
          else
            echo "Creating release $tag."
            gh release create "$tag" -R "$GITHUB_REPOSITORY" --verify-tag \
              --title "$tag" --notes "Examazej $tag — Windows installer (auto-published by CI)."
          fi

      - name: Build and publish Windows installer
        env:
          # electron-builder reads GH_TOKEN to upload assets to the release created above.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:publish
